services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmm
      POSTGRES_PASSWORD: mmm
      POSTGRES_DB: mmm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mmm:mmm@postgres:5432/mmm
      DUCKDB_PATH: /app/data/mmm_analytics.duckdb
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
